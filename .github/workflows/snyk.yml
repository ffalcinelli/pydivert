name: Snyk Security Scan

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: '0 0 * * 0'

jobs:
  snyk:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      
      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
      
      - name: Verify uv version and lockfile
        run: |
          uv --version
          uv lock --check
      
      - name: Set up Python
        run: uv python install 3.12
      
      - name: Set up Snyk
        uses: snyk/actions/setup@9adf32b1121593767fc3c057af55b55db032dc04 # v1.0.0

      - name: Snyk Security Scan (CI Gate)
        run: |
          snyk test --all-projects --json > snyk_results.json || true
          python3 -c "
          import json, sys
          try:
              with open('snyk_results.json') as f:
                  data = json.load(f)
              
              # snyk test --json returns a list if multiple projects are found, 
              # or a single dict if only one.
              if isinstance(data, list):
                  all_vulnerabilities = []
                  for project in data:
                      all_vulnerabilities.extend(project.get('vulnerabilities', []))
              else:
                  all_vulnerabilities = data.get('vulnerabilities', [])

              # Filter out license issues and project-specific dual-license HIGH severity issue
              real_issues = [
                  v for v in all_vulnerabilities 
                  if v.get('type') != 'license' 
                  and not (v.get('package') == 'pydivert' and 'Dual license' in v.get('title', ''))
              ]
              if real_issues:
                  print(f'Found {len(real_issues)} real vulnerabilities.')
                  for v in real_issues:
                      print(f'- {v.get(\"title\")} in {v.get(\"package\")} ({v.get(\"severity\")})')
                  sys.exit(1)
              print('No real vulnerabilities found (excluding ignored licenses).')
          except Exception as e:
              print(f'Error processing Snyk results: {e}')
              sys.exit(1)
          "
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Snyk Monitor
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: snyk monitor --all-projects
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}


