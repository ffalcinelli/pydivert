name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: Install uv
      uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
      with:
        enable-cache: true
    - name: Set up Python
      run: uv python install 3.12
    - name: Run linting
      run: uv run --extra lint ruff check pydivert
    - name: Run formatting check
      run: uv run --extra lint ruff format --check pydivert
    - name: Run type checking
      run: uv run --extra typecheck --extra test ty check pydivert

  test-windows:
    needs: lint
    runs-on: windows-latest
    permissions:
      contents: read
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: Install uv
      uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
      with:
        enable-cache: true
    - name: Set up Python ${{ matrix.python-version }}
      run: uv python install ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        uv sync --extra test
    
    - name: Run tests
      run: |
        uv run pytest pydivert --capture=no -v --cov pydivert --cov-report=xml
    
    - name: Upload coverage
      uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
      with:
        files: ./coverage.xml
        token: ${{ secrets.CODECOV_TOKEN }}
        fail_ci_if_error: false

  test-linux:
    needs: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libnetfilter-queue-dev
    - name: Install uv
      uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
      with:
        enable-cache: true
    - name: Set up Python ${{ matrix.python-version }}
      run: uv python install ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        uv sync --extra test --extra linux
    
    - name: Configure loopback
      run: |
        sudo ethtool -K lo rx off tx off || true

    - name: Run tests
      run: |
        # We run with sudo to allow NetFilterQueue and iptables operations.
        # Most integration tests will gracefully skip if they still can't bind.
        sudo -E .venv/bin/python -m pytest pydivert --capture=no -v --cov pydivert --cov-report=xml
    
    - name: Upload coverage
      uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
      with:
        files: ./coverage.xml
        token: ${{ secrets.CODECOV_TOKEN }}
        fail_ci_if_error: false

  test-macos:
    needs: lint
    runs-on: macos-latest
    continue-on-error: true
    permissions:
      contents: read
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: Install uv
      uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
      with:
        enable-cache: true
    - name: Set up Python ${{ matrix.python-version }}
      run: uv python install ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        uv sync --extra test
    
    - name: Run tests
      run: |
        # macOS tests use Divert Sockets which require root privileges.
        # We use the full path to the python interpreter in the venv to ensure consistency.
        sudo -E .venv/bin/python -m pytest pydivert --capture=no -v --cov pydivert --cov-report=xml
    
    - name: Upload coverage
      uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
      with:
        files: ./coverage.xml
        token: ${{ secrets.CODECOV_TOKEN }}
        fail_ci_if_error: false

  test-freebsd:
    needs: lint
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: Test in FreeBSD
      uses: vmactions/freebsd-vm@7ca82f79fe3078fecded6d3a2bff094995447bbd # v1.4.4
      with:
        usesh: true
        prepare: |
          pkg install -y python${{ matrix.python-version == '3.11' && '311' || matrix.python-version == '3.12' && '312' || '313' }} py${{ matrix.python-version == '3.11' && '311' || matrix.python-version == '3.12' && '312' || '313' }}-sqlite3 curl git sudo gcc pkgconf
          # pip might be named differently or need ensurepip
          python${{ matrix.python-version }} -m ensurepip || true
          python${{ matrix.python-version }} -m pip install --upgrade pip || true
          kldload ipfw || true
          service ipfw start || true
          kldload ipdivert || true
          sysctl net.inet.ip.divert_on_loopback=1 || true
        run: |
          python${{ matrix.python-version }} -m venv venv
          ./venv/bin/pip install -e .[test]
          sudo ./venv/bin/pytest pydivert --capture=no -v --cov pydivert --cov-report=xml
    - name: Upload coverage
      uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
      with:
        files: ./coverage.xml
        token: ${{ secrets.CODECOV_TOKEN }}
        fail_ci_if_error: false
