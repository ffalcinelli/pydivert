name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v6
    - name: Install uv
      uses: astral-sh/setup-uv@885a051ca639700f261205c45449a59329262059 # v7
      with:
        enable-cache: true
    - name: Set up Python
      run: uv python install 3.12
    - name: Run linting
      run: uv run --extra lint ruff check pydivert
    - name: Run type checking
      run: uv run --extra typecheck mypy pydivert

  test:
    needs: lint
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v6
    - name: Install uv
      uses: astral-sh/setup-uv@885a051ca639700f261205c45449a59329262059 # v7
      with:
        enable-cache: true
    - name: Set up Python ${{ matrix.python-version }}
      run: uv python install ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        uv sync --extra test
    
    - name: Run tests
      run: |
        uv run pytest pydivert --capture=no -v --cov pydivert --cov-report=xml
    
    - name: Upload coverage
      uses: codecov/codecov-action@57e3a139692f592115ad3173b6199d6d600349d9 # v6.0.0
      with:
        file: ./coverage.xml
        token: ${{ secrets.CODECOV_TOKEN }}
        fail_ci_if_error: false
