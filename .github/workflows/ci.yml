name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: Install uv
      uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
      with:
        enable-cache: true
    - name: Set up Python
      run: uv python install 3.12
    - name: Run linting
      run: uv run --extra lint ruff check pydivert
    - name: Run type checking
      run: uv run --extra typecheck mypy pydivert

  test-windows:
    needs: lint
    runs-on: windows-latest
    permissions:
      contents: read
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: Install uv
      uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
      with:
        enable-cache: true
    - name: Set up Python ${{ matrix.python-version }}
      run: uv python install ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        uv sync --extra test
    
    - name: Run tests
      run: |
        uv run pytest pydivert --capture=no -v --cov pydivert --cov-report=xml
    
    - name: Upload coverage
      uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
      with:
        file: ./coverage.xml
        token: ${{ secrets.CODECOV_TOKEN }}
        fail_ci_if_error: false

  test-linux:
    needs: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libnetfilter-queue-dev
    - name: Install uv
      uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
      with:
        enable-cache: true
    - name: Set up Python ${{ matrix.python-version }}
      run: uv python install ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        uv sync --extra test
    
    - name: Run tests
      run: |
        # We run as sudo to allow NetFilterQueue tests to at least try to open
        # although GitHub Actions might still restrict it.
        # Most integration tests will gracefully skip if they can't bind.
        uv run pytest pydivert --capture=no -v --cov pydivert --cov-report=xml
    
    - name: Upload coverage
      uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
      with:
        file: ./coverage.xml
        token: ${{ secrets.CODECOV_TOKEN }}
        fail_ci_if_error: false

  test-macos:
    needs: lint
    runs-on: macos-latest
    permissions:
      contents: read
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: Install uv
      uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
      with:
        enable-cache: true
    - name: Set up Python ${{ matrix.python-version }}
      run: uv python install ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        uv sync --extra test
    
    - name: Run tests
      run: |
        # macOS tests use Divert Sockets which might require privileges.
        uv run pytest pydivert --capture=no -v --cov pydivert --cov-report=xml
    
    - name: Upload coverage
      uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
      with:
        file: ./coverage.xml
        token: ${{ secrets.CODECOV_TOKEN }}
        fail_ci_if_error: false

  test-freebsd:
    needs: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: Test in FreeBSD
      uses: vmactions/freebsd-vm@23377dc5736838124ff0059faccb2ecf7a62a943 # v1.1.11
      with:
        usesh: true
        prepare: |
          pkg install -y python311 py311-pip py311-sqlite3 curl git
          kldload ipdivert || true
          sysctl net.inet.ip.divert_on_loopback=1 || true
        run: |
          python3.11 -m venv venv
          ./venv/bin/pip install -e .[test]
          ./venv/bin/pytest pydivert --capture=no -v --cov pydivert --cov-report=xml
    - name: Upload coverage
      uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
      with:
        file: ./coverage.xml
        token: ${{ secrets.CODECOV_TOKEN }}
        fail_ci_if_error: false
